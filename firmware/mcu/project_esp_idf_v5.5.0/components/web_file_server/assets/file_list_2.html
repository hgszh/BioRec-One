<script>

  path_div.addEventListener("click", () => {
    alert(`Current Path is: ${path}`);
  })

  if (path !== "/") {
    const pathSegments = path.split("/");
    pathSegments.pop();
    const currentPath = (
      "/" +
      pathSegments.filter((segment) => segment).join("/") +
      "/"
    ).replace(/\/+/g, "/");
    pathSegments.pop();
    const parentPath = (
      "/" +
      pathSegments.filter((segment) => segment).join("/") +
      "/"
    ).replace(/\/+/g, "/");

    const upload_button = document.getElementById("upload-button");
    upload_button.href =
      "/upload.html#" + encodeURIComponent(currentPath || "/");
  } else {
    document.getElementById("parent-path-table-row").style = "display: none;";
  }

  // UPDATED: Event listener logic
  document.getElementById('file-list').addEventListener('click', function (event) {
    // Find the closest parent 'A' tag or 'BUTTON' tag that was clicked
    const targetElement = event.target;

    // Handle delete button clicks
    if (targetElement.classList.contains('deleteButton')) {
      event.preventDefault();
      const filepath = targetElement.getAttribute('filepath');
      if (filepath) {
        deleteFile(filepath);
      }
      return;
    }

    // Handle file anchor link clicks for download
    const anchor = targetElement.closest('a');
    if (anchor && anchor.parentElement.classList.contains('file')) {
      // Prevent the default immediate download
      event.preventDefault();
      // Call our new function that shows a prompt and then starts the download
      downloadFileWithPrompt(anchor);
    }
  });
</script>
